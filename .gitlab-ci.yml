push-back-to-remote:
  script:
    - git config user.email "ejones18@sheffield.ac.uk"
    - git config user.name "ejones18-bot"
    - git remote rm origin
    - git remote add origin https://github.com/ejones18/shef_iot.git
    - git add .
    - git commit -m "Update from IoT gitlab"
    - git push gitlab_origin HEAD:main -o ci.skip